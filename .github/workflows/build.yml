name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy dist to gh-pages (optional – for preview)
        # This step uploads the dist/ folder as a GitHub Pages artifact.
        # Hostinger reads from the main branch — the .htaccess in dist/ handles routing.
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
