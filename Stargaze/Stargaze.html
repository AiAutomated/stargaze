<html lang="en">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{background:#05051a;color:rgba(255,255,255,.9);font-family:'Space Grotesk',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;position:relative}
:root{--acc:#6d9bff;--acc2:#a78bfa;--acc3:#22d3ee}
/* Nebula background — global */
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 1200px 800px at 15% 10%,rgba(109,155,255,.22),transparent 60%),
  radial-gradient(ellipse 900px 700px at 85% 30%,rgba(167,139,250,.18),transparent 60%),
  radial-gradient(ellipse 1000px 600px at 50% 95%,rgba(34,211,238,.12),transparent 60%),
  radial-gradient(ellipse 700px 500px at 90% 90%,rgba(244,114,182,.10),transparent 60%),
  #05051a;z-index:-2;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.4) 1px,transparent 1px);background-size:3px 3px;opacity:.018;z-index:-1;pointer-events:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:linear-gradient(rgba(109,155,255,.3),rgba(167,139,250,.3));border-radius:3px}
/* Type */
.d{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.03em}
.s{font-family:'Instrument Serif',serif;font-style:italic;letter-spacing:-0.01em}
.m{font-family:'JetBrains Mono',monospace}
.grad{background:linear-gradient(135deg,#dfe8ff 0%,#b8c5ff 25%,#a78bfa 60%,#22d3ee 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.gradg{background:linear-gradient(90deg,rgba(255,255,255,.9),rgba(255,255,255,.45));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
/* Glass card */
.g{background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.08);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:transform .4s cubic-bezier(.2,.8,.2,1),border-color .3s,background .3s}
.g::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.08),transparent 40%);opacity:.6;pointer-events:none;border-radius:inherit}
.g:hover{border-color:rgba(109,155,255,.35);transform:translateY(-4px)}
.g:hover::after{content:'';position:absolute;inset:-1px;background:linear-gradient(135deg,rgba(109,155,255,.4),rgba(167,139,250,.3),transparent);border-radius:inherit;z-index:-1;filter:blur(12px);opacity:.5}
.glow{box-shadow:0 0 40px rgba(109,155,255,.25),0 0 80px rgba(167,139,250,.15),inset 0 1px 0 rgba(255,255,255,.1)}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:14px 26px;border-radius:999px;cursor:pointer;transition:all .3s cubic-bezier(.2,.8,.2,1);text-decoration:none;border:none;white-space:nowrap;position:relative;overflow:hidden}
.btnp{background:linear-gradient(135deg,#6d9bff,#a78bfa);color:white;box-shadow:0 4px 30px rgba(109,155,255,.4),inset 0 1px 0 rgba(255,255,255,.25)}
.btnp:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(109,155,255,.6),inset 0 1px 0 rgba(255,255,255,.3)}
.btng{background:rgba(255,255,255,.04);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px)}
.btng:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25);transform:translateY(-2px)}
/* Live dot with glow */
.ldot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 12px #4ade80,0 0 4px white;animation:pulse 2s ease-in-out infinite;display:inline-block;flex-shrink:0}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.7}}
@keyframes fup{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fin{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shine{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes spin-s{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.fup{animation:fup .8s cubic-bezier(.2,.8,.2,1) forwards;opacity:0}
.fup-d1{animation-delay:.1s}.fup-d2{animation-delay:.2s}.fup-d3{animation-delay:.35s}.fup-d4{animation-delay:.5s}.fup-d5{animation-delay:.65s}
.fin{animation:fin 1s ease forwards}
.shimmer{background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);background-size:200% 100%;animation:shimmer 3s ease-in-out infinite}

.bp{background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.08)}
.ml{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4)}

.nl{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);padding:8px 16px;border-radius:999px;cursor:pointer;background:none;border:none;transition:all .2s;position:relative}

.twl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.two{display:flex;gap:6px;flex-wrap:wrap}
.twob{padding:6px 12px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.55);transition:all .15s}
.twob.s,.twob:hover{border-color:var(--acc);color:white;background:rgba(109,155,255,.15)}
@media(max-width:900px){.bento{grid-template-columns:1fr!important;grid-auto-rows:auto!important}.bento>*{grid-column:auto!important;grid-row:auto!important}.twocol{grid-template-columns:1fr!important}.statsbar{grid-template-columns:repeat(2,1fr)!important}}

const fmtCD=ms=>{if(ms<=0)return{days:'00',hours:'00',mins:'00',secs:'00'};const s=Math.floor(ms/1000);return{days:String(Math.floor(s/86400)).padStart(2,'0'),hours:String(Math.floor((s%86400)/3600)).padStart(2,'0'),mins:String(Math.floor((s%3600)/60)).padStart(2,'0'),secs:String(s%60).padStart(2,'0')};};

// ─── METEOR SHOWER CANVAS (hero) ─────────────────────────────────────────────
function MeteorSky(){
  const ref=useRef(null);
  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext('2d');let id;
    const resize=()=>{c.width=c.offsetWidth*devicePixelRatio;c.height=c.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);};
    resize();const ro=new ResizeObserver(()=>{c.width=c.offsetWidth*devicePixelRatio;c.height=c.offsetHeight*devicePixelRatio;});ro.observe(c);
    let seed=31337;const rand=()=>{seed=(seed*9301+49297)%233280;return seed/233280;};
    const W=()=>c.width/devicePixelRatio,H=()=>c.height/devicePixelRatio;
    const stars=Array.from({length:220},()=>({x:rand(),y:rand(),r:rand()*1.4+.3,a:rand()*.7+.15,ph:rand()*Math.PI*2,sp:rand()*.02+.006,col:rand()<.15?'214,220,255':rand()<.3?'255,230,200':'255,255,255'}));
    const meteors=[];
    let t=0;
    const draw=()=>{
      t+=.016;ctx.clearRect(0,0,W(),H());
      // stars
      stars.forEach(s=>{
        const a=s.a+Math.sin(t*s.sp*60+s.ph)*.25;
        ctx.beginPath();ctx.arc(s.x*W(),s.y*H(),s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(${s.col},${Math.max(.05,a)})`;ctx.fill();
        if(s.r>1.2){const g=ctx.createRadialGradient(s.x*W(),s.y*H(),0,s.x*W(),s.y*H(),s.r*5);g.addColorStop(0,`rgba(${s.col},${a*.35})`);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(s.x*W(),s.y*H(),s.r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();}
      });
      // spawn meteors
      if(Math.random()<.025&&meteors.length<6){
        const sx=Math.random()*W()*1.2-W()*.1,sy=-40;
        meteors.push({x:sx,y:sy,vx:2.5+Math.random()*2,vy:4+Math.random()*3,life:0,max:110+Math.random()*60,size:1+Math.random()*1.2});
      }
      for(let i=meteors.length-1;i>=0;i--){
        const m=meteors[i];const a=Math.min(1,m.life/15)*(1-m.life/m.max);
        // tail
        const tx=m.x-m.vx*18,ty=m.y-m.vy*18;
        const g=ctx.createLinearGradient(m.x,m.y,tx,ty);
        g.addColorStop(0,`rgba(220,230,255,${a})`);g.addColorStop(.3,`rgba(167,139,250,${a*.7})`);g.addColorStop(1,'transparent');
        ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(tx,ty);ctx.strokeStyle=g;ctx.lineWidth=m.size;ctx.lineCap='round';ctx.stroke();
        // head glow
        const hg=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,12);hg.addColorStop(0,`rgba(255,255,255,${a})`);hg.addColorStop(1,'transparent');
        ctx.beginPath();ctx.arc(m.x,m.y,12,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
        m.x+=m.vx;m.y+=m.vy;m.life++;
        if(m.life>=m.max||m.x>W()+40||m.y>H()+40)meteors.splice(i,1);
      }
      id=requestAnimationFrame(draw);
    };draw();
    return()=>{cancelAnimationFrame(id);ro.disconnect();};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',display:'block'}}/>;
}

    <div style={{position:'absolute',top:-4,left:'50%',width:8,height:8,borderRadius:'50%',background:color,boxShadow:`0 0 12px ${color}`,transform:'translateX(-50%)'}}/>
  </div>;
}

// Shared components
const ML=({children,style})=><span className="ml" style={style}>{children}</span>;

function Countdown({targetDate,size='md'}){
  const[cd,setCd]=useState(()=>fmtCD(new Date(targetDate)-Date.now()));
  useEffect(()=>{const id=setInterval(()=>setCd(fmtCD(new Date(targetDate)-Date.now())),1000);return()=>clearInterval(id);},[targetDate]);
  const fs=size==='lg'?'clamp(2rem,5vw,3.4rem)':'clamp(1.4rem,3.5vw,2.2rem)';
  return <div style={{display:'flex',gap:8}}>
    {[['Days',cd.days],['Hrs',cd.hours],['Min',cd.mins],['Sec',cd.secs]].map(([l,v])=>(
      <div key={l} className="g glow" style={{textAlign:'center',padding:'14px 10px',minWidth:64,borderRadius:14}}>
        <div className="d grad" style={{fontSize:fs,fontWeight:700,lineHeight:1,letterSpacing:'-0.03em'}}>{v}</div>
        <div className="m" style={{fontSize:9,letterSpacing:'0.18em',color:'rgba(255,255,255,.4)',marginTop:6,textTransform:'uppercase'}}>{l}</div>
      </div>
    ))}
  </div>;
}

function ISSWidget(){
  const[iss,setIss]=useState(null),[err,setErr]=useState(false);
  const load=useCallback(async()=>{try{const r=await fetch('https://api.wheretheiss.at/v1/satellites/25544'),d=await r.json();setIss({lat:+d.latitude.toFixed(2),lng:+d.longitude.toFixed(2),alt:Math.round(d.altitude),vel:Math.round(d.velocity)});setErr(false);}catch{setErr(true);}},[]);
  useEffect(()=>{load();const id=setInterval(load,5000);return()=>clearInterval(id);},[load]);
  return <div className="g" style={{padding:24}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
      <ML>ISS · Orbital Position</ML>

}

// ─── LIVE ─────────────────────────────────────────────────────────────────────

    setReports(p=>[{id:Date.now().toString(),time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}),location:form.location,magnitude:form.magnitude||'—',duration:form.duration||'—',type:form.type},...p]);

// ─── SHOWER DETAIL ────────────────────────────────────────────────────────────
function ShowerPage({id,nav}){
  const s=SHOWERS.find(sh=>sh.id===id);
  const cref=useRef(null);
  useEffect(()=>{
    if(!s||!cref.current)return;
    const c=cref.current,ctx=c.getContext('2d');c.width=c.offsetWidth*devicePixelRatio;c.height=c.offsetHeight*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);
    const ms=[];const stars=Array.from({length:40},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1+.3,a:Math.random()*.5+.2}));
    let aid;const W=()=>c.width/devicePixelRatio,H=()=>c.height/devicePixelRatio;
    const draw=()=>{
      ctx.clearRect(0,0,W(),H());
      stars.forEach(st=>{ctx.beginPath();ctx.arc(st.x*W(),st.y*H(),st.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${st.a})`;ctx.fill();});
      if(Math.random()<.12)ms.push({x:Math.random()*W(),y:-10,vx:2.5+Math.random()*2,vy:3+Math.random()*3,life:0,max:60+Math.random()*30,sz:1+Math.random()});
      for(let i=ms.length-1;i>=0;i--){
        const m=ms[i],a=1-m.life/m.max,tx=m.x-m.vx*12,ty=m.y-m.vy*12;
        const g=ctx.createLinearGradient(m.x,m.y,tx,ty);g.addColorStop(0,`rgba(220,230,255,${a})`);g.addColorStop(1,'transparent');
        ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(tx,ty);ctx.strokeStyle=g;ctx.lineWidth=m.sz;ctx.lineCap='round';ctx.stroke();
        m.x+=m.vx;m.y+=m.vy;m.life++;if(m.life>=m.max)ms.splice(i,1);
      }
      aid=requestAnimationFrame(draw);
    };draw();return()=>cancelAnimationFrame(aid);
  },[s]);
  if(!s)return <div style={{padding:'160px 28px',textAlign:'center'}}><ML>Shower not found</ML></div>;
  const st=getStatus(s),days=daysUntil(s.peak),col=zhrColor(s.zhr);
  return <div style={{maxWidth:1280,margin:'0 auto',padding:'140px 28px 80px'}}>
    <button onClick={()=>nav('/')} className="btn btng" style={{marginBottom:36,fontSize:10,padding:'10px 18px'}}>← Back</button>
    <div className="twocol" style={{display:'grid',gridTemplateColumns:'1.1fr 1fr',gap:56,alignItems:'start'}}>
      <div className="fup fup-d1">
        <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
          <span className={`badge b${st[0]}`}>{st==='active'&&<span className="ldot" style={{width:6,height:6}}/>}{st}</span>
          <span className="badge bp">in {s.constellation}</span>
        </div>
        <h1 className="d" style={{fontSize:'clamp(3.5rem,8vw,6.5rem)',fontWeight:700,letterSpacing:'-0.045em',lineHeight:.9,marginBottom:16}}>
          <span className="grad">{s.name}</span>
        </h1>
        <p className="s" style={{fontSize:'clamp(1.2rem,1.8vw,1.6rem)',color:'rgba(255,255,255,.7)',lineHeight:1.4,marginBottom:32}}>{s.orbitalPeriod?`Orbital period ${s.orbitalPeriod}.`:'Annual shower from cometary debris.'}</p>
        <p style={{fontSize:16,color:'rgba(255,255,255,.6)',lineHeight:1.75,marginBottom:36,maxWidth:560}}>{s.description}</p>
        {s.viewingTips&&<div className="g" style={{padding:24,marginBottom:24,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-40,right:-40,width:140,height:140,borderRadius:'50%',background:'radial-gradient(circle,rgba(34,211,238,.15),transparent 70%)',pointerEvents:'none'}}/>
          <ML style={{display:'block',marginBottom:12,color:'rgba(34,211,238,.9)'}}>◐ Viewing Tips</ML>
          <p style={{fontSize:14,color:'rgba(255,255,255,.65)',lineHeight:1.7}}>{s.viewingTips}</p>
        </div>}
        {s.historicalStorms&&<div className="g" style={{padding:24}}>
          <ML style={{display:'block',marginBottom:12,color:'rgba(167,139,250,.9)'}}>✦ Historical Record</ML>
          <p style={{fontSize:14,color:'rgba(255,255,255,.6)',lineHeight:1.7}}>{s.historicalStorms}</p>
        </div>}
      </div>

      <div className="fup fup-d2" style={{display:'flex',flexDirection:'column',gap:20}}>
        {/* ZHR hero */}
        <div className="g glow" style={{position:'relative',height:220,borderRadius:24,overflow:'hidden'}}>
          <canvas ref={cref} style={{width:'100%',height:'100%',display:'block',opacity:.7}}/>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:`radial-gradient(ellipse at center,${col}18,transparent 70%)`}}>
            <div className="m" style={{fontSize:10,letterSpacing:'0.2em',color:'rgba(255,255,255,.5)',marginBottom:8}}>PEAK ZHR</div>
            <div className="d" style={{fontSize:'clamp(3rem,7vw,5rem)',fontWeight:700,color:col,letterSpacing:'-0.05em',lineHeight:1,textShadow:`0 0 40px ${col}`}}>{s.zhr}</div>
            <div className="m" style={{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:6}}>meteors / hour</div>
          </div>
        </div>

        {/* Stats grid */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {[
            ['Peak Date',fmtDate(s.peak),'#6d9bff'],
            ['Speed',`${s.speed}`,'#22d3ee','km/s'],
            ['Active',`${fmtShort(s.start)} – ${fmtShort(s.end)}`,'#a78bfa'],
            ['Parent',s.parent,'rgba(255,255,255,.85)'],
          ].map(([k,v,c,u])=>(
            <div key={k} className="g" style={{padding:'18px 20px'}}>
              <div className="m" style={{fontSize:9,color:'rgba(255,255,255,.35)',letterSpacing:'0.15em',marginBottom:6}}>{k.toUpperCase()}</div>
              <div className="d" style={{fontSize:14,fontWeight:600,color:c,letterSpacing:'-0.01em',lineHeight:1.3}}>{v}{u&&<span style={{fontSize:'.7em',color:'rgba(255,255,255,.4)',marginLeft:4}}>{u}</span>}</div>
            </div>
          ))}
        </div>

        {days>0&&<div className="g" style={{padding:24}}>
          <ML style={{display:'block',marginBottom:14}}>Peak Countdown</ML>
          <Countdown targetDate={s.peak}/>
        </div>}
      </div>
    </div>
  </div>;
}

// TWEAKS
const TWEAK_DEFAULTS=/*EDITMODE-BEGIN*/{"accent":"#6d9bff","accent2":"#a78bfa"}/*EDITMODE-END*/;
function TweaksPanel({tweaks,set}){
  const P=[{l:'Cosmic',v:'#6d9bff',v2:'#a78bfa'},{l:'Nebula',v:'#f472b6',v2:'#a78bfa'},{l:'Aurora',v:'#4ade80',v2:'#22d3ee'},{l:'Solar',v:'#f59e0b',v2:'#ef4444'}];
  return <div id="tw" style={{display:'flex'}}>
    <span className="m" style={{fontSize:10,letterSpacing:'0.18em',color:'rgba(255,255,255,.6)',fontWeight:700}}>⚙ TWEAKS</span>
    <div><div className="twl">Palette</div><div className="two">{P.map(a=><button key={a.v} className={`twob${tweaks.accent===a.v?' s':''}`} onClick={()=>set({accent:a.v,accent2:a.v2})}>{a.l}</button>)}</div></div>
  </div>;
}

function App(){
  const{page,nav}=useRoute();
  const[tweaks,setTweaks]=useState(()=>{try{return{...TWEAK_DEFAULTS,...JSON.parse(localStorage.getItem('sg_tw')||'{}')};}catch{return TWEAK_DEFAULTS;}});
  const[twOpen,setTwOpen]=useState(false);
  useEffect(()=>{localStorage.setItem('sg_tw',JSON.stringify(tweaks));document.documentElement.style.setProperty('--acc',tweaks.accent);document.documentElement.style.setProperty('--acc2',tweaks.accent2||'#a78bfa');},[tweaks]);
  useEffect(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode')setTwOpen(true);if(e.data?.type==='__deactivate_edit_mode')setTwOpen(false);if(e.data?.type==='__edit_mode_set_keys'&&e.data.edits)setTweaks(t=>({...t,...e.data.edits}));};
    window.addEventListener('message',h);window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);
  const persist=e=>{setTweaks(t=>({...t,...e}));window.parent.postMessage({type:'__edit_mode_set_keys',edits:e},'*');};
  const sm=page.match(/^\/shower\/(.+)$/);
  const render=()=>{
    if(sm)return <ShowerPage id={sm[1]} nav={nav}/>;
    if(page==='/calendar')return <CalendarPage nav={nav}/>;
    if(page==='/live')return <LivePage/>;
    if(page==='/globe')return <GlobePage/>;
    if(page==='/about')return <AboutPage/>;
    return <HomePage nav={nav}/>;
  };
  return <div data-screen-label={sm?`Shower: ${sm[1]}`:page}><Nav page={page} nav={nav}/><main>{render()}</main><Footer nav={nav}/>{twOpen&&<TweaksPanel tweaks={tweaks} set={persist}/>}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
